<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TabTopic Organizer</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="popup-container">

    <!-- Шапка: заголовок + кнопка темы -->
    <header class="header">
      <div class="header__left">
        <h1 class="header__title">TabTopic</h1>
        <span class="header__badge">Beta 0.4</span>
      </div>
      <button id="btn-theme" class="theme-btn" type="button" title="Сменить тему">
        <svg id="icon-sun" class="theme-btn__icon" width="18" height="18" viewBox="0 0 18 18" fill="none">
          <circle cx="9" cy="9" r="4" stroke="currentColor" stroke-width="1.5"/>
          <line x1="9" y1="1" x2="9" y2="3" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
          <line x1="9" y1="15" x2="9" y2="17" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
          <line x1="1" y1="9" x2="3" y2="9" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
          <line x1="15" y1="9" x2="17" y2="9" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
          <line x1="3.3" y1="3.3" x2="4.7" y2="4.7" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
          <line x1="13.3" y1="13.3" x2="14.7" y2="14.7" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
          <line x1="3.3" y1="14.7" x2="4.7" y2="13.3" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
          <line x1="13.3" y1="4.7" x2="14.7" y2="3.3" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
        </svg>
        <svg id="icon-moon" class="theme-btn__icon" width="18" height="18" viewBox="0 0 18 18" fill="none" hidden>
          <path d="M15 10.5A6.5 6.5 0 0 1 7.5 3a7 7 0 1 0 7.5 7.5z" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </button>
    </header>

    <!-- Статус -->
    <div id="status" class="status" aria-live="polite">
      <span id="status-icon" class="status__icon"></span>
      <span id="status-text" class="status__text">Нажмите кнопку для группировки</span>
    </div>

    <!-- Кнопки управления -->
    <div class="actions">
      <button id="btn-group" class="btn btn--primary" type="button">
        <svg class="btn__icon" width="16" height="16" viewBox="0 0 16 16" fill="none">
          <rect x="1" y="1" width="6" height="6" rx="1.5" stroke="currentColor" stroke-width="1.5"/>
          <rect x="9" y="1" width="6" height="6" rx="1.5" stroke="currentColor" stroke-width="1.5"/>
          <rect x="1" y="9" width="6" height="6" rx="1.5" stroke="currentColor" stroke-width="1.5"/>
          <rect x="9" y="9" width="6" height="6" rx="1.5" stroke="currentColor" stroke-width="1.5"/>
        </svg>
        <span>Сгруппировать вкладки</span>
      </button>

      <button id="btn-ungroup" class="btn btn--outline" type="button">
        <svg class="btn__icon" width="16" height="16" viewBox="0 0 16 16" fill="none">
          <line x1="2" y1="2" x2="14" y2="14" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
          <line x1="14" y1="2" x2="2" y2="14" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
        </svg>
        <span>Разгруппировать все</span>
      </button>
    </div>

    <!-- Настройки -->
    <div class="settings">
      <div class="toggle-row">
        <label class="toggle-label" for="toggle-auto-group">Автогруппировка</label>
        <input type="checkbox" id="toggle-auto-group" class="toggle-input">
      </div>
    </div>

    <!-- Разделитель -->
    <hr class="divider">

    <!-- Редактор категорий -->
    <div class="panel">
      <div class="panel__header">
        <span class="panel__title">Категории</span>
        <button id="btn-add-category" class="btn btn--icon" type="button" title="Добавить категорию">
          <svg width="14" height="14" viewBox="0 0 14 14" fill="none">
            <line x1="7" y1="2" x2="7" y2="12" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
            <line x1="2" y1="7" x2="12" y2="7" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
          </svg>
        </button>
      </div>

      <div id="categories-list" class="categories-list"></div>

      <div class="panel__actions">
        <button id="btn-save-categories" class="btn btn--primary btn--small" type="button">Сохранить</button>
        <button id="btn-reset-categories" class="btn btn--outline btn--small" type="button">Сбросить</button>
      </div>
    </div>

    <!-- Предупреждение -->
    <div id="warning" class="warning" hidden>
      <p id="warning-text" class="warning__text"></p>
    </div>

    <!-- Подвал -->
    <footer class="footer">
      <span>TabTopic Organizer v0.4</span>
    </footer>
  </div>

  <script src="popup.js"></script>
</body>
</html>
