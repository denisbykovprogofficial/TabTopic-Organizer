<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TabTopic</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="app">

    <!-- Topbar -->
    <header class="topbar">
      <div class="topbar__brand">
        <svg class="topbar__logo" width="22" height="22" viewBox="0 0 22 22" fill="none">
          <rect width="22" height="22" rx="6" fill="url(#lg)"/>
          <rect x="4" y="7" width="5" height="3" rx="1" fill="#fff" opacity=".9"/>
          <rect x="4" y="12" width="7" height="3" rx="1" fill="#fff" opacity=".6"/>
          <rect x="11" y="7" width="7" height="3" rx="1" fill="#fff" opacity=".7"/>
          <rect x="12" y="12" width="6" height="3" rx="1" fill="#fff" opacity=".5"/>
          <defs><linearGradient id="lg" x1="0" y1="0" x2="22" y2="22"><stop stop-color="#667eea"/><stop offset="1" stop-color="#764ba2"/></linearGradient></defs>
        </svg>
        <span class="topbar__name">TabTopic</span>
      </div>
      <div class="topbar__actions">
        <button id="btn-theme" class="icon-btn" type="button" title="Toggle theme">
          <svg id="ico-sun" width="16" height="16" viewBox="0 0 16 16" fill="none"><circle cx="8" cy="8" r="3.5" stroke="currentColor" stroke-width="1.3"/><g stroke="currentColor" stroke-width="1.3" stroke-linecap="round"><line x1="8" y1="1" x2="8" y2="2.5"/><line x1="8" y1="13.5" x2="8" y2="15"/><line x1="1" y1="8" x2="2.5" y2="8"/><line x1="13.5" y1="8" x2="15" y2="8"/><line x1="3.1" y1="3.1" x2="4.2" y2="4.2"/><line x1="11.8" y1="11.8" x2="12.9" y2="12.9"/><line x1="3.1" y1="12.9" x2="4.2" y2="11.8"/><line x1="11.8" y1="4.2" x2="12.9" y2="3.1"/></g></svg>
          <svg id="ico-moon" width="16" height="16" viewBox="0 0 16 16" fill="none" hidden><path d="M13.5 9A5.5 5.5 0 0 1 7 2.5a6 6 0 1 0 6.5 6.5z" stroke="currentColor" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round"/></svg>
        </button>
      </div>
    </header>

    <!-- Tab counter -->
    <div class="counter">
      <span id="counter-text" class="counter__text">Loading...</span>
    </div>

    <!-- Search -->
    <div class="search">
      <svg class="search__icon" width="14" height="14" viewBox="0 0 14 14" fill="none"><circle cx="6" cy="6" r="4.5" stroke="currentColor" stroke-width="1.3"/><line x1="9.3" y1="9.3" x2="12.5" y2="12.5" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/></svg>
      <input id="search-input" class="search__input" type="text" placeholder="Search tabs...">
    </div>

    <!-- Toast -->
    <div id="status" class="toast" aria-live="polite">
      <span id="status-icon" class="toast__icon"></span>
      <span id="status-text" class="toast__text">Click a button to start</span>
    </div>

    <!-- Main actions -->
    <div class="btn-row">
      <button id="btn-group" class="btn btn--gradient" type="button">
        <svg width="14" height="14" viewBox="0 0 14 14" fill="none"><rect x=".5" y=".5" width="5" height="5" rx="1.5" stroke="currentColor"/><rect x="8.5" y=".5" width="5" height="5" rx="1.5" stroke="currentColor"/><rect x=".5" y="8.5" width="5" height="5" rx="1.5" stroke="currentColor"/><rect x="8.5" y="8.5" width="5" height="5" rx="1.5" stroke="currentColor"/></svg>
        Group
      </button>
      <button id="btn-ungroup" class="btn btn--ghost" type="button">
        <svg width="14" height="14" viewBox="0 0 14 14" fill="none"><line x1="2" y1="2" x2="12" y2="12" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/><line x1="12" y1="2" x2="2" y2="12" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/></svg>
        Ungroup
      </button>
    </div>

    <!-- Secondary actions -->
    <div class="btn-row">
      <button id="btn-undo" class="btn btn--sm btn--ghost" type="button" title="Undo (Alt+Shift+Z)">Undo</button>
      <button id="btn-collapse" class="btn btn--sm btn--ghost" type="button">Collapse</button>
      <button id="btn-expand" class="btn btn--sm btn--ghost" type="button">Expand</button>
    </div>

    <!-- Settings -->
    <div class="setting">
      <label class="setting__label" for="toggle-auto">Auto-group</label>
      <input type="checkbox" id="toggle-auto" class="switch">
    </div>

    <!-- Tabs list (search results) -->
    <div id="tab-results" class="tab-list" hidden></div>

    <!-- Categories section -->
    <div class="section">
      <div class="section__head">
        <span class="section__title">Categories</span>
        <div class="section__btns">
          <button id="btn-add" class="icon-btn icon-btn--accent" type="button" title="Add category">
            <svg width="12" height="12" viewBox="0 0 12 12" fill="none"><line x1="6" y1="1" x2="6" y2="11" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/><line x1="1" y1="6" x2="11" y2="6" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/></svg>
          </button>
        </div>
      </div>
      <div id="categories" class="cat-list"></div>
      <div class="section__foot">
        <button id="btn-save" class="btn btn--sm btn--gradient" type="button">Save</button>
        <button id="btn-reset" class="btn btn--sm btn--ghost" type="button">Reset</button>
      </div>
    </div>

    <!-- Group stats -->
    <div id="stats-section" class="section" hidden>
      <div class="section__head">
        <span class="section__title">Active Groups</span>
      </div>
      <div id="group-stats" class="stats-list"></div>
    </div>

    <!-- Duplicates -->
    <div id="dupes-section" class="section" hidden>
      <div class="section__head">
        <span class="section__title">Duplicates</span>
        <button id="btn-close-dupes" class="icon-btn" type="button" title="Close duplicates">
          <svg width="12" height="12" viewBox="0 0 12 12" fill="none"><line x1="2" y1="2" x2="10" y2="10" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/><line x1="10" y1="2" x2="2" y2="10" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/></svg>
        </button>
      </div>
      <div id="dupes-list" class="dupes-list"></div>
    </div>

    <!-- Sessions -->
    <div class="section">
      <div class="section__head">
        <span class="section__title">Sessions</span>
        <div class="section__btns">
          <button id="btn-save-session" class="icon-btn icon-btn--accent" type="button" title="Save session">
            <svg width="12" height="12" viewBox="0 0 12 12" fill="none"><path d="M2 8V10a1 1 0 001 1h6a1 1 0 001-1V8" stroke="currentColor" stroke-width="1.2" stroke-linecap="round"/><path d="M6 1v7M3.5 5.5L6 8l2.5-2.5" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"/></svg>
          </button>
          <button id="btn-show-sessions" class="icon-btn" type="button" title="Manage sessions">
            <svg width="12" height="12" viewBox="0 0 12 12" fill="none"><circle cx="2" cy="6" r="1" fill="currentColor"/><circle cx="6" cy="6" r="1" fill="currentColor"/><circle cx="10" cy="6" r="1" fill="currentColor"/></svg>
          </button>
        </div>
      </div>
      <div id="sessions-list" class="sessions-list" hidden></div>
    </div>

    <!-- Export/Import -->
    <div class="section">
      <div class="section__head">
        <span class="section__title">Data</span>
      </div>
      <div class="btn-row">
        <button id="btn-export" class="btn btn--sm btn--ghost" type="button">Export</button>
        <button id="btn-import" class="btn btn--sm btn--ghost" type="button">Import</button>
        <button id="btn-dupes" class="btn btn--sm btn--ghost" type="button">Find Dupes</button>
      </div>
      <input type="file" id="file-import" accept=".json" hidden>
    </div>

    <!-- Whitelist/Blacklist -->
    <div class="section">
      <div class="section__head">
        <span class="section__title">Filters</span>
      </div>
      <div class="filter-tabs">
        <button id="tab-whitelist" class="filter-tab filter-tab--active" type="button">Whitelist</button>
        <button id="tab-blacklist" class="filter-tab" type="button">Blacklist</button>
      </div>
      <div id="filter-content" class="filter-content">
        <textarea id="filter-list" class="filter-textarea" placeholder="URLs, one per line..." rows="3"></textarea>
        <button id="btn-save-filter" class="btn btn--sm btn--gradient" type="button">Save</button>
      </div>
    </div>

    <!-- Warning -->
    <div id="warning" class="alert" hidden>
      <p id="warning-text" class="alert__text"></p>
    </div>

  </div>
  <script src="popup.js"></script>
</body>
</html>
