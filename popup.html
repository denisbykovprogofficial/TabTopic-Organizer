<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TabTopic</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="app">

    <!-- Шапка -->
    <header class="topbar">
      <div class="topbar__brand">
        <svg class="topbar__logo" width="22" height="22" viewBox="0 0 22 22" fill="none">
          <rect width="22" height="22" rx="6" fill="url(#logo-grad)"/>
          <rect x="4" y="7" width="5" height="3" rx="1" fill="#fff" opacity=".9"/>
          <rect x="4" y="12" width="7" height="3" rx="1" fill="#fff" opacity=".6"/>
          <rect x="11" y="7" width="7" height="3" rx="1" fill="#fff" opacity=".7"/>
          <rect x="12" y="12" width="6" height="3" rx="1" fill="#fff" opacity=".5"/>
          <defs><linearGradient id="logo-grad" x1="0" y1="0" x2="22" y2="22"><stop stop-color="#667eea"/><stop offset="1" stop-color="#764ba2"/></linearGradient></defs>
        </svg>
        <span class="topbar__name">TabTopic</span>
      </div>
      <div class="topbar__actions">
        <button id="btn-theme" class="icon-btn" type="button" title="Сменить тему">
          <svg id="ico-sun" width="16" height="16" viewBox="0 0 16 16" fill="none"><circle cx="8" cy="8" r="3.5" stroke="currentColor" stroke-width="1.3"/><g stroke="currentColor" stroke-width="1.3" stroke-linecap="round"><line x1="8" y1="1" x2="8" y2="2.5"/><line x1="8" y1="13.5" x2="8" y2="15"/><line x1="1" y1="8" x2="2.5" y2="8"/><line x1="13.5" y1="8" x2="15" y2="8"/><line x1="3.1" y1="3.1" x2="4.2" y2="4.2"/><line x1="11.8" y1="11.8" x2="12.9" y2="12.9"/><line x1="3.1" y1="12.9" x2="4.2" y2="11.8"/><line x1="11.8" y1="4.2" x2="12.9" y2="3.1"/></g></svg>
          <svg id="ico-moon" width="16" height="16" viewBox="0 0 16 16" fill="none" hidden><path d="M13.5 9A5.5 5.5 0 0 1 7 2.5a6 6 0 1 0 6.5 6.5z" stroke="currentColor" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round"/></svg>
        </button>
      </div>
    </header>

    <!-- Счётчик вкладок -->
    <div id="tab-counter" class="counter">
      <span id="counter-text" class="counter__text">Загрузка...</span>
    </div>

    <!-- Статус -->
    <div id="status" class="toast" aria-live="polite">
      <span id="status-icon" class="toast__icon"></span>
      <span id="status-text" class="toast__text">Нажмите кнопку для группировки</span>
    </div>

    <!-- Действия -->
    <div class="btn-group">
      <button id="btn-group" class="btn btn--gradient" type="button">
        <svg width="15" height="15" viewBox="0 0 15 15" fill="none"><rect x=".5" y=".5" width="5.5" height="5.5" rx="1.5" stroke="currentColor"/><rect x="9" y=".5" width="5.5" height="5.5" rx="1.5" stroke="currentColor"/><rect x=".5" y="9" width="5.5" height="5.5" rx="1.5" stroke="currentColor"/><rect x="9" y="9" width="5.5" height="5.5" rx="1.5" stroke="currentColor"/></svg>
        Сгруппировать
      </button>
      <button id="btn-ungroup" class="btn btn--ghost" type="button">
        <svg width="15" height="15" viewBox="0 0 15 15" fill="none"><line x1="2" y1="2" x2="13" y2="13" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/><line x1="13" y1="2" x2="2" y2="13" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/></svg>
        Разгруппировать
      </button>
    </div>

    <!-- Настройки -->
    <div class="setting">
      <label class="setting__label" for="toggle-auto">Автогруппировка</label>
      <input type="checkbox" id="toggle-auto" class="switch">
    </div>

    <!-- Секция категорий -->
    <div class="section">
      <div class="section__head">
        <span class="section__title">Категории</span>
        <button id="btn-add" class="icon-btn icon-btn--accent" type="button" title="Добавить">
          <svg width="12" height="12" viewBox="0 0 12 12" fill="none"><line x1="6" y1="1" x2="6" y2="11" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/><line x1="1" y1="6" x2="11" y2="6" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/></svg>
        </button>
      </div>
      <div id="categories" class="cat-list"></div>
      <div class="section__foot">
        <button id="btn-save" class="btn btn--sm btn--gradient" type="button">Сохранить</button>
        <button id="btn-reset" class="btn btn--sm btn--ghost" type="button">Сбросить</button>
      </div>
    </div>

    <!-- Предупреждение -->
    <div id="warning" class="alert" hidden>
      <p id="warning-text" class="alert__text"></p>
    </div>

  </div>
  <script src="popup.js"></script>
</body>
</html>
